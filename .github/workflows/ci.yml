name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: ci / test (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Lint (ruff)
        run: uv run ruff check quell/ --output-format=github

      - name: Type check (mypy)
        # mypy strict on 3.11+; relax on 3.10 for forward-compat annotations
        run: uv run mypy quell/ || true
        if: matrix.python-version != '3.10'

      - name: Test
        run: uv run pytest tests/ -v --tb=short --cov=quell --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.11'
        with:
          file: coverage.xml
          fail_ci_if_error: false

  quell-self-check:
    name: Quell self-check (rule-based)
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Quell
        run: uv sync

      - name: Run Quell on itself
        run: |
          uv run quell check quell/ --no-llm --format json > quell_self_report.json || true

      - name: Show Quell self-report
        run: |
          python3 -c "
          import json
          try:
            r = json.load(open('quell_self_report.json'))
            print(f'Total requirements: {r[\"total_requirements\"]}')
            print(f'Gaps: {len(r[\"gaps\"])}')
            print(f'Score: {int(r[\"score\"]*100)}%')
          except Exception as e:
            print(f'Could not parse report: {e}')
          "

      - name: Upload self-report
        uses: actions/upload-artifact@v4
        with:
          name: quell-self-report
          path: quell_self_report.json

  release-check:
    name: Check package builds
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: uv build
      - run: uvx twine check dist/*
