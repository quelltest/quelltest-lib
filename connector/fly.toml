app = "quelltest-connector"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[[services]]
  protocol = "tcp"
  internal_port = 8001
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = true

  [services.concurrency]
    type = "requests"
    hard_limit = 250
    soft_limit = 200

[env]
  ENVIRONMENT = "production"
  CONNECTOR_URL = "https://mcp.quelltest.com"

[[regions]]
  code = "iad"

[[regions]]
  code = "bom"
